<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZenFlow - Create Task Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "inverse-on-surface": "#ebf1ff",
                "outline-variant": "#c2c6d6",
                "surface-container-highest": "#dce2f3",
                "on-primary": "#ffffff",
                "outline": "#727785",
                "on-tertiary-container": "#fffbff",
                "surface-container": "#e7eefe",
                "inverse-primary": "#adc6ff",
                "primary-container": "#2170e4",
                "error": "#ba1a1a",
                "background": "#f9f9ff",
                "surface-container-lowest": "#ffffff",
                "on-tertiary-fixed": "#311400",
                "surface-tint": "#005ac2",
                "secondary-fixed-dim": "#d2bbff",
                "on-surface": "#151c27",
                "on-primary-fixed-variant": "#004395",
                "secondary": "#712ae2",
                "on-background": "#151c27",
                "on-primary-fixed": "#001a42",
                "on-secondary-fixed": "#25005a",
                "surface-container-high": "#e2e8f8",
                "tertiary-container": "#b75b00",
                "on-secondary-container": "#fffbff",
                "secondary-fixed": "#eaddff",
                "secondary-container": "#8a4cfc",
                "on-secondary-fixed-variant": "#5a00c6",
                "surface-dim": "#d3daea",
                "inverse-surface": "#2a313d",
                "on-error": "#ffffff",
                "primary-fixed": "#d8e2ff",
                "on-error-container": "#93000a",
                "surface-variant": "#dce2f3",
                "on-tertiary": "#ffffff",
                "tertiary-fixed-dim": "#ffb786",
                "on-surface-variant": "#424754",
                "surface": "#f9f9ff",
                "tertiary": "#924700",
                "tertiary-fixed": "#ffdcc6",
                "error-container": "#ffdad6",
                "primary": "#0058be",
                "surface-container-low": "#f0f3ff",
                "on-secondary": "#ffffff",
                "surface-bright": "#f9f9ff",
                "primary-fixed-dim": "#adc6ff",
                "on-primary-container": "#fefcff",
                "on-tertiary-fixed-variant": "#723600"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "kanban-column-width": "300px",
                "sm": "8px",
                "base": "4px",
                "2xl": "48px",
                "md": "16px",
                "gutter": "16px",
                "sidebar-width": "260px",
                "xl": "32px",
                "xs": "4px",
                "lg": "24px"
        },
        "fontFamily": {
            sans: ['Inter', 'sans-serif'],
        },
        "fontSize": {
                "body-md": [
                        "14px",
                        {
                                "lineHeight": "20px",
                                "fontWeight": "400"
                        }
                ],
                "label-sm": [
                        "12px",
                        {
                                "lineHeight": "16px",
                                "letterSpacing": "0.05em",
                                "fontWeight": "600"
                        }
                ],
                "display-lg": [
                        "36px",
                        {
                                "lineHeight": "44px",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                        }
                ],
                "headline-md": [
                        "24px",
                        {
                                "lineHeight": "32px",
                                "letterSpacing": "-0.01em",
                                "fontWeight": "600"
                        }
                ],
                "body-lg": [
                        "16px",
                        {
                                "lineHeight": "24px",
                                "fontWeight": "400"
                        }
                ],
                "display-lg-mobile": [
                        "28px",
                        {
                                "lineHeight": "36px",
                                "letterSpacing": "-0.01em",
                                "fontWeight": "700"
                        }
                ],
                "headline-sm": [
                        "18px",
                        {
                                "lineHeight": "28px",
                                "fontWeight": "600"
                        }
                ],
                "label-md": [
                        "13px",
                        {
                                "lineHeight": "18px",
                                "fontWeight": "500"
                        }
                ]
        }
},
    },
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .rich-text-editor:empty:before {
    content: attr(data-placeholder);
    color: #c2c6d6;
    pointer-events: none;
    display: block;
  }
</style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-40 flex items-center justify-center p-md">
<!-- Modal Container -->
<div class="bg-surface w-full max-w-2xl rounded-xl shadow-lg border border-outline-variant flex flex-col max-h-[921px] overflow-hidden z-50">
<!-- Modal Header -->
<div class="px-xl py-lg border-b border-outline-variant flex justify-between items-center bg-surface-container-low">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Create Task</h2>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-sm rounded hover:bg-surface-container-highest focus:outline-none focus:ring-2 focus:ring-primary">
<span class="material-symbols-outlined font-label-md text-label-md" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="flex-1 overflow-y-auto px-xl py-lg space-y-lg">
<!-- Title Input -->
<div class="space-y-xs">
<input class="w-full bg-transparent font-headline-md text-headline-md text-on-surface placeholder:text-outline-variant border-none focus:ring-0 px-0 focus:outline-none py-sm border-b-2 border-transparent focus:border-primary transition-colors" placeholder="Task Title" type="text"/>
</div>
<!-- Meta Grid -->
<div class="grid grid-cols-2 gap-md">
<!-- Status Select -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Status</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container h-10 px-md pr-xl rounded-lg font-body-md text-body-md text-on-surface border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer outline-none">
<option value="todo">To Do</option>
<option value="in_progress">In Progress</option>
<option value="in_review">In Review</option>
<option value="done">Done</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
<!-- Priority Select -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Priority</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container h-10 px-md pr-xl rounded-lg font-body-md text-body-md text-on-surface border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-colors cursor-pointer outline-none">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
<option value="urgent">Urgent</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
<!-- Due Date -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Due Date</label>
<div class="relative flex items-center h-10 bg-surface-container rounded-lg border border-outline-variant px-md focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors cursor-pointer hover:bg-surface-container-high">
<span class="material-symbols-outlined text-on-surface-variant mr-sm text-label-md" style="font-variation-settings: 'FILL' 0;">calendar_today</span>
<span class="font-body-md text-body-md text-on-surface-variant select-none">Set due date</span>
</div>
</div>
<!-- Assignee -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Assignee</label>
<div class="relative flex items-center h-10 bg-surface-container rounded-lg border border-outline-variant px-md focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors cursor-pointer hover:bg-surface-container-high">
<span class="material-symbols-outlined text-on-surface-variant mr-sm text-label-md" style="font-variation-settings: 'FILL' 0;">person_add</span>
<span class="font-body-md text-body-md text-on-surface-variant select-none">Unassigned</span>
</div>
</div>
</div>
<!-- Description (Rich Text area mockup) -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Description</label>
<div class="border border-outline-variant rounded-lg overflow-hidden bg-surface-container-lowest focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors">
<!-- Toolbar -->
<div class="flex items-center gap-xs px-sm py-sm border-b border-outline-variant bg-surface-container flex-wrap">
<button class="p-xs rounded text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors" title="Bold">
<span class="material-symbols-outlined text-label-md" style="font-variation-settings: 'FILL' 0;">format_bold</span>
</button>
<button class="p-xs rounded text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors" title="Italic">
<span class="material-symbols-outlined text-label-md" style="font-variation-settings: 'FILL' 0;">format_italic</span>
</button>
<button class="p-xs rounded text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors" title="Strikethrough">
<span class="material-symbols-outlined text-label-md" style="font-variation-settings: 'FILL' 0;">strikethrough_s</span>
</button>
<div class="w-px h-4 bg-outline-variant mx-xs"></div>
<button class="p-xs rounded text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors" title="List Bulleted">
<span class="material-symbols-outlined text-label-md" style="font-variation-settings: 'FILL' 0;">format_list_bulleted</span>
</button>
<button class="p-xs rounded text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors" title="List Numbered">
<span class="material-symbols-outlined text-label-md" style="font-variation-settings: 'FILL' 0;">format_list_numbered</span>
</button>
<div class="w-px h-4 bg-outline-variant mx-xs"></div>
<button class="p-xs rounded text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-colors" title="Attach">
<span class="material-symbols-outlined text-label-md" style="font-variation-settings: 'FILL' 0;">attach_file</span>
</button>
</div>
<!-- Editor Content -->
<div class="p-md min-h-[160px] font-body-md text-body-md text-on-surface rich-text-editor focus:outline-none" contenteditable="true" data-placeholder="Add a detailed description..."></div>
</div>
</div>
<!-- Labels -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider block">Labels</label>
<div class="flex items-center gap-sm flex-wrap">
<button class="flex items-center gap-xs px-sm py-xs rounded-full border border-dashed border-outline text-on-surface-variant font-label-md text-label-md hover:bg-surface-container hover:text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1">
<span class="material-symbols-outlined text-label-md" style="font-variation-settings: 'FILL' 0;">add</span>
                 Add Label
              </button>
<!-- Example Chips -->
<span class="inline-flex items-center gap-xs px-sm py-xs rounded-full bg-primary-container text-on-primary-container font-label-md text-label-md">
                Feature
                <button class="hover:text-primary transition-colors focus:outline-none rounded-full"><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 0;">close</span></button>
</span>
<span class="inline-flex items-center gap-xs px-sm py-xs rounded-full bg-error-container text-on-error-container font-label-md text-label-md">
                Bug
                <button class="hover:text-error transition-colors focus:outline-none rounded-full"><span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 0;">close</span></button>
</span>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-xl py-lg border-t border-outline-variant bg-surface-container-low flex justify-end gap-md items-center">
<button class="px-lg py-sm rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-highest transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
          Cancel
        </button>
<button class="px-lg py-sm rounded-lg font-label-md text-label-md bg-primary text-on-primary hover:bg-primary-fixed-variant transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface">
          Create Task
        </button>
</div>
</div>
</div>
</body></html>
